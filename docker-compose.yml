version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: smart_resume
    environment:
      POSTGRES_USER: postgresuser123
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: smart_resume_db
    ports:
      - "5435:5432"
    volumes:
      - smart_resume_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  smart_resume_data: